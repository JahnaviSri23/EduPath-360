<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath360 - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #E6E6FA, #D8BFD8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .register-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            width: 400px;
        }
        h1 {
            text-align: center;
            color: #6A0DAD;
            margin-bottom: 25px;
        }
        input, select {
            width: 100%;
            padding: 12px 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: linear-gradient(90deg, #7B68EE, #6A5ACD);
            color: white;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #6A5ACD, #7B68EE);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Register</h1>
        <form action="/register" method="POST" enctype="multipart/form-data">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="text" name="mobile" placeholder="Mobile Number" required>
            
            <label for="class_completed">Class Completed:</label>
            <select name="class_completed" required>
                <option value="" disabled selected>Select</option>
                <option value="10">10th</option>
                <option value="12">12th</option>
            </select>
            
            <label for="marklist">Upload Mark List (PDF/JPG)</label>
            <input type="file" name="marklist" required>
            
            <button type="submit" class="btn">Register</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath360 - Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #E6E6FA, #D8BFD8);
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #6A5ACD;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background-color: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #6A0DAD;
            margin-bottom: 20px;
        }
        .question {
            margin-bottom: 25px;
        }
        .question p {
            font-weight: 500;
            color: #4B0082;
        }
        .option {
            display: block;
            margin: 8px 0;
        }
        .btn-submit {
            padding: 12px 25px;
            background: linear-gradient(90deg, #7B68EE, #6A5ACD);
            color: white;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: linear-gradient(90deg, #6A5ACD, #7B68EE);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>EduPath360</div>
        <div><a href="/dashboard">Dashboard</a></div>
        <div><a href="/logout">Logout</a></div>
    </div>

    <div class="container">
        <h1>{{ exam_type|capitalize }} Test</h1>
        <form action="/submit_exam" method="POST">
            {% for q in questions %}
            <div class="question">
                <p>{{ loop.index }}. {{ q.question }}</p>
                {% for opt in q.options %}
                    <label class="option">
                        <input type="radio" name="q{{ loop.index0 }}" value="{{ opt }}" required> {{ opt }}
                    </label>
                {% endfor %}
            </div>
            {% endfor %}
            <button type="submit" class="btn-submit">Submit Exam</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath360 - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #E6E6FA, #D8BFD8);
        }
        .navbar {
            background-color: #6A5ACD;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background-color: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #6A0DAD;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: linear-gradient(90deg, #7B68EE, #6A5ACD);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #6A5ACD, #7B68EE);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>EduPath360</div>
        <div><a href="/logout">Logout</a></div>
    </div>

    <div class="container">
        <h1>Welcome, {{ name }}!</h1>
        <p>Select what you want to do:</p>
        <a class="btn" href="/select_exam">Start Career Quiz</a>
    </div>
</body>
</html>

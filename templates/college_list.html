<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath360 - Colleges</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #E6E6FA, #D8BFD8);
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #6A5ACD;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            background-color: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #6A0DAD;
            margin-bottom: 20px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ccc;
            text-align: center;
        }
        th {
            background-color: #7B68EE;
            color: white;
        }
        tr:hover {
            background-color: #E6E6FA;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div>EduPath360</div>
        <div><a href="/dashboard">Dashboard</a></div>
        <div><a href="/logout">Logout</a></div>
    </div>

    <div class="container">
        <h1>Colleges in {{ district }}</h1>
        <table>
            <tr>
                <th>College Name</th>
                <th>Seats</th>
                <th>Entrance Exam</th>
                <th>Exam Date</th>
            </tr>
            {% for college in colleges %}
            <tr>
                <td>{{ college.name }}</td>
                <td>{{ college.seats }}</td>
                <td>{{ college.entrance_exam }}</td>
                <td>{{ college.exam_date }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>

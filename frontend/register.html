<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | EDUPATH-360</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold text-primary" href="index.html">
EDUPATH-360
</a>
</div>
</nav>

<!-- REGISTER SECTION -->

<section class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card p-4 shadow">

<h2 class="text-center mb-4">Create Account</h2>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="text" id="mobile" class="form-control" required>
</div>

<div class="mb-3">
<button type="button" onclick="sendOTP()">Send OTP</button>
</div>

<div class="mb-3">
<label class="form-label">Enter OTP</label>
<input type="text" id="otp" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" id="confirmPassword" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Captcha</label>

<div class="d-flex">
<input type="text" id="captchaInput" class="form-control me-2" placeholder="Enter captcha">
<span id="captcha" class="border p-2 bg-light"></span>
</div>

</div>

<button type="submit" class="btn btn-primary w-100">
Register
</button>

</form>

<p class="text-center mt-3">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

</div>

</section>

<script src="../js/validation.js"></script>

</body>

</html>
